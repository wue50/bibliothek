<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1a1408"/>
  <!-- Gold border -->
  <rect x="12" y="12" width="488" height="488" rx="72" fill="none" stroke="#c9a84c" stroke-width="8"/>
  
  <!-- Book 1 (left, dark) -->
  <rect x="100" y="160" width="72" height="220" rx="6" fill="#2a1e0a"/>
  <rect x="100" y="160" width="12" height="220" rx="3" fill="#c9a84c" opacity="0.8"/>
  <rect x="104" y="180" width="60" height="4" rx="2" fill="#c9a84c" opacity="0.4"/>
  <rect x="104" y="200" width="48" height="3" rx="2" fill="#c9a84c" opacity="0.3"/>
  <rect x="104" y="215" width="54" height="3" rx="2" fill="#c9a84c" opacity="0.3"/>

  <!-- Book 2 (middle, gold accent) -->
  <rect x="192" y="130" width="80" height="250" rx="6" fill="#3a2810"/>
  <rect x="192" y="130" width="14" height="250" rx="3" fill="#c9a84c"/>
  <rect x="198" y="155" width="66" height="5" rx="2" fill="#e8c97a" opacity="0.7"/>
  <rect x="198" y="175" width="52" height="3" rx="2" fill="#c9a84c" opacity="0.5"/>
  <rect x="198" y="190" width="58" height="3" rx="2" fill="#c9a84c" opacity="0.4"/>
  <rect x="198" y="205" width="44" height="3" rx="2" fill="#c9a84c" opacity="0.4"/>
  <!-- Iron cross on spine -->
  <rect x="197" y="290" width="14" height="4" rx="1" fill="#e8c97a"/>
  <rect x="202" y="285" width="4" height="14" rx="1" fill="#e8c97a"/>

  <!-- Book 3 (right) -->
  <rect x="292" y="150" width="76" height="230" rx="6" fill="#241a06"/>
  <rect x="292" y="150" width="12" height="230" rx="3" fill="#c9a84c" opacity="0.9"/>
  <rect x="296" y="170" width="64" height="4" rx="2" fill="#e8c97a" opacity="0.6"/>
  <rect x="296" y="188" width="50" height="3" rx="2" fill="#c9a84c" opacity="0.4"/>
  <rect x="296" y="202" width="56" height="3" rx="2" fill="#c9a84c" opacity="0.3"/>

  <!-- Book 4 (far right, thin) -->
  <rect x="388" y="170" width="44" height="210" rx="6" fill="#1e1506"/>
  <rect x="388" y="170" width="10" height="210" rx="3" fill="#c9a84c" opacity="0.7"/>
  <rect x="390" y="188" width="36" height="3" rx="2" fill="#c9a84c" opacity="0.4"/>

  <!-- Shelf line -->
  <rect x="80" y="382" width="352" height="10" rx="4" fill="#c9a84c" opacity="0.6"/>
  <rect x="60" y="388" width="392" height="6" rx="3" fill="#c9a84c" opacity="0.3"/>

  <!-- Title text -->
  <text x="256" y="450" text-anchor="middle" font-family="Georgia, serif" 
    font-size="38" font-weight="bold" fill="#c9a84c" letter-spacing="3">BIBLIOTHEK</text>
</svg>
